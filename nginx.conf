# Forum API NGINX Configuration
# This configuration provides:
# - HTTPS support with SSL/TLS
# - Rate limiting for /threads endpoints (90 requests per minute)
# - Reverse proxy to Node.js application
# - Security headers

# Define rate limiting zone
# This limits requests to /threads and its sub-paths
limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;

# Upstream configuration for Node.js application
upstream forum_api {
    server localhost:5000;
    keepalive 64;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.dcdg.xyz;  # Replace with your actual domain

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.dcdg.xyz;  # Replace with your actual domain

    # SSL Certificate Configuration
    # Replace with your actual certificate paths
    ssl_certificate /etc/letsencrypt/live/your-domain.dcdg.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.dcdg.xyz/privkey.pem;

    # SSL Configuration for security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/forum-api-access.log;
    error_log /var/log/nginx/forum-api-error.log;

    # Client body size limit
    client_max_body_size 10M;

    # Apply rate limiting to /threads and all sub-paths
    location /threads {
        # Rate limit: 90 requests per minute per IP
        limit_req zone=threads_limit burst=10 nodelay;
        limit_req_status 429;

        # Proxy configuration
        proxy_pass http://forum_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # All other locations (users, authentications, etc.)
    location / {
        proxy_pass http://forum_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
